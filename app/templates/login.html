{% extends "base.html" %}
{% block title %}Giriş · SignalConvert{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-16">
  <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-xl">
    <h1 class="text-2xl font-bold mb-1">SignalConvert</h1>
    <p class="text-slate-400 text-sm mb-6">Admin girişi yap.</p>
    {% if error %}<div class="mb-4 px-3 py-2 rounded bg-red-900/40 border border-red-800 text-red-200 text-sm">{{ error }}</div>{% endif %}
    <form method="post" class="space-y-4">
      <div>
        <label class="block text-sm mb-1 text-slate-300">Admin parolası</label>
        <input type="password" name="password" required autofocus
               class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-brand-500" />
      </div>
      <button class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2 rounded-lg">Giriş Yap</button>
    </form>
    <p class="text-xs text-slate-500 mt-4">Parolayı <code class="bg-slate-800 px-1 rounded">.env</code> dosyasındaki <code>ADMIN_PASSWORD</code> belirler.</p>
  </div>
</div>
{% endblock %}
